<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="conteiner">
    <h1 class="logo">
        <span class="mercado">Mercado</span><span class="ao">AO</span>
    </h1>
    <h6>Entra na tua área de vendedor</h6>  
      <form>
         <div class="input-box">
         <input type="email" placeholder="Usuário">
         <i class="bx bxs-user"></i>
         </div>
         <div class="input-box">
         <input type="password" placeholder="Senha">
         <i class="bx bxs-lock-alt"> </i>
         </div>
         <div class="register">
         <label>
         <input type="checkbox">
         Lembrar minha senha
         </label>
         <a href="#"> Esqueci minha senha</a>
         </div>    
         <button type="submit"  class="login">Login</button>
         <div class="remember">
         <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
         </div>
      </form>
    </div>
</body>
</html>
